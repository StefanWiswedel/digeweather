<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1714">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Digeweather — Copenhagen</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Newsreader:opsz,wght,ital@6..72,300,0;6..72,400,0;6..72,400,1;6..72,500,0;6..72,600,0&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #1a1714;
            --bg-surface: #211e19;
            --bg-raised: #2a2620;
            --bg-overlay: #332e27;
            --bg-hover: #3b352d;

            --border-dim: rgba(210,190,160,0.06);
            --border-subtle: rgba(210,190,160,0.10);
            --border-medium: rgba(210,190,160,0.16);

            --text-primary: #ede6db;
            --text-secondary: #a89f93;
            --text-tertiary: #7a7168;
            --text-ghost: #514a42;

            --accent: #c8a46e;
            --accent-muted: rgba(200,164,110,0.12);
            --accent-subtle: rgba(200,164,110,0.06);

            --clr-temp: #c8a46e;
            --clr-humidity: #8aabb5;
            --clr-wind: #9ab07d;
            --clr-rain: #7e9eb5;
            --clr-gust: #b5a08a;

            --status-ok: #8aab7d;
            --status-err: #c47a6e;
            --status-warn: #c8a46e;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;

            --font-display: 'Fraunces', Georgia, serif;
            --font-body: 'Newsreader', Georgia, serif;

            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding: env(safe-area-inset-top) 0 0;
            overflow-x: hidden;
        }

        /* Warm ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -100px;
            left: 50%;
            translate: -50% 0;
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(200,164,110,0.035) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Subtle grain texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.020;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        /* ---------- HEADER ---------- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(to bottom, var(--bg-base) 60%, transparent);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
        }

        .header-left h1 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.2;
        }

        .header-subtitle {
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .status-pip {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--status-ok);
            transition: background 0.3s ease;
        }

        .status-pip.offline {
            background: var(--status-err);
        }

        .battery-warn {
            font-family: var(--font-body);
            font-size: 0.6875rem;
            color: var(--status-warn);
            display: none;
        }

        .battery-warn.visible { display: inline; }

        /* ---------- HERO TEMPERATURE ---------- */
        .hero {
            text-align: center;
            padding: 32px 0 12px;
        }

        .hero-temp {
            font-family: var(--font-display);
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            letter-spacing: -0.03em;
            display: inline-block;
        }

        .hero-temp .unit {
            font-size: 1.75rem;
            font-weight: 300;
            color: var(--text-ghost);
            vertical-align: super;
            margin-left: -2px;
        }

        .hero-condition {
            font-family: var(--font-body);
            font-style: italic;
            font-size: 0.9375rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .hero-time {
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: var(--text-ghost);
            margin-top: 8px;
        }

        .hero-time .time-ago {
            color: var(--text-tertiary);
        }

        .hero-time .time-stale {
            color: var(--status-err);
        }

        /* ---------- METRICS ---------- */
        .metrics {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 20px 0 28px;
        }

        .metric {
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-md);
            padding: 14px 8px 12px;
            text-align: center;
        }

        .metric-label {
            font-family: var(--font-body);
            font-size: 0.6875rem;
            font-weight: 400;
            color: var(--text-tertiary);
            margin-bottom: 6px;
        }

        .metric-value {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.1;
        }

        .metric-value .unit {
            font-family: var(--font-body);
            font-size: 0.625rem;
            font-weight: 300;
            color: var(--text-ghost);
            margin-left: 1px;
        }

        .metric-sub {
            font-family: var(--font-body);
            font-size: 0.625rem;
            color: var(--text-ghost);
            margin-top: 4px;
        }

        .metric.humidity .metric-value { color: var(--clr-humidity); }
        .metric.wind .metric-value { color: var(--clr-wind); }
        .metric.gust .metric-value { color: var(--clr-gust); }
        .metric.rain .metric-value { color: var(--clr-rain); }

        /* Wind compass */
        .compass-mini {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 5px;
        }

        .compass-ring {
            width: 20px;
            height: 20px;
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            position: relative;
            background: var(--bg-raised);
        }

        .compass-needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 6px;
            background: var(--clr-wind);
            border-radius: 1px;
            transform-origin: bottom center;
            margin-left: -1px;
            margin-top: -6px;
            transition: transform 0.6s var(--ease-out);
        }

        .compass-needle::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -1.5px;
            border-left: 2.5px solid transparent;
            border-right: 2.5px solid transparent;
            border-bottom: 3px solid var(--clr-wind);
        }

        .compass-dir {
            font-family: var(--font-body);
            font-size: 0.5625rem;
            color: var(--text-tertiary);
        }

        /* ---------- CHARTS ---------- */
        .section-label {
            font-family: var(--font-body);
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-tertiary);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        .chart-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-lg);
            padding: 16px 14px 12px;
            margin-bottom: 12px;
        }

        .chart-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .chart-title {
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .range-group {
            display: flex;
            background: var(--bg-raised);
            border-radius: var(--radius-sm);
            padding: 2px;
            gap: 1px;
        }

        .range-btn {
            font-family: var(--font-body);
            font-size: 0.6875rem;
            font-weight: 400;
            background: transparent;
            border: none;
            color: var(--text-ghost);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .range-btn:hover { color: var(--text-tertiary); }

        .range-btn.active {
            background: var(--bg-overlay);
            color: var(--accent);
        }

        .chart-area {
            height: 140px;
            position: relative;
        }

        /* ---------- FORECAST ---------- */
        .forecast-block {
            margin-top: 28px;
        }

        .forecast-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .forecast-row {
            display: grid;
            grid-template-columns: 52px 32px 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 12px 14px;
            background: var(--bg-surface);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .forecast-row:hover {
            background: var(--bg-raised);
        }

        .forecast-row.expanded {
            background: var(--bg-raised);
            border-color: var(--border-subtle);
        }

        .fc-day {
            font-family: var(--font-display);
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        .fc-day .fc-date {
            font-family: var(--font-body);
            font-size: 0.625rem;
            color: var(--text-ghost);
            font-weight: 400;
            display: block;
        }

        .fc-icon {
            font-size: 1.25rem;
            text-align: center;
        }

        /* Middle area: preview on desktop, temp bar on mobile */
        .fc-middle {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }

        .fc-temp-bar {
            flex: 1;
            height: 3px;
            border-radius: 2px;
            background: var(--bg-overlay);
            position: relative;
            min-width: 40px;
        }

        .fc-temp-bar-fill {
            position: absolute;
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(to right, var(--clr-rain), var(--accent));
            transition: left 0.3s ease, width 0.3s ease;
        }

        .fc-preview {
            display: flex;
            gap: 3px;
            overflow: hidden;
            mask-image: linear-gradient(to right, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to right, black 80%, transparent);
        }

        .fc-pip {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 26px;
            padding: 3px 2px;
            background: var(--bg-raised);
            border-radius: 6px;
            gap: 1px;
        }

        .fc-pip .pip-time {
            font-family: var(--font-body);
            font-size: 0.5rem;
            color: var(--text-ghost);
        }

        .fc-pip .pip-icon { font-size: 0.625rem; }

        .fc-pip .pip-temp {
            font-family: var(--font-display);
            font-size: 0.5625rem;
            color: var(--text-tertiary);
        }

        .fc-pip.now {
            background: var(--accent-muted);
        }

        .fc-pip.now .pip-temp { color: var(--accent); }

        .fc-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .fc-temps {
            text-align: right;
            font-family: var(--font-display);
            font-size: 0.875rem;
        }

        .fc-high { color: var(--text-primary); font-weight: 600; }
        .fc-low { color: var(--text-ghost); font-weight: 400; margin-left: 2px; }

        .fc-precip {
            font-family: var(--font-body);
            font-size: 0.6875rem;
            color: var(--clr-rain);
            min-width: 32px;
            text-align: right;
        }

        .fc-chevron {
            color: var(--text-ghost);
            font-size: 0.625rem;
            transition: transform 0.25s ease;
            margin-left: 2px;
        }

        .forecast-row.expanded .fc-chevron {
            transform: rotate(180deg);
        }

        /* Expanded details */
        .fc-details {
            grid-column: 1 / -1;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.25s ease;
            opacity: 0;
        }

        .forecast-row.expanded .fc-details {
            max-height: 400px;
            opacity: 1;
        }

        .fc-details-inner {
            padding-top: 12px;
            margin-top: 12px;
            border-top: 1px solid var(--border-dim);
        }

        .fc-hourly-scroll {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 6px;
            scrollbar-width: thin;
            scrollbar-color: var(--bg-overlay) transparent;
        }

        .fc-hourly-scroll::-webkit-scrollbar { height: 3px; }
        .fc-hourly-scroll::-webkit-scrollbar-track { background: transparent; }
        .fc-hourly-scroll::-webkit-scrollbar-thumb { background: var(--bg-overlay); border-radius: 2px; }

        .fc-hour {
            flex: 0 0 auto;
            text-align: center;
            padding: 8px 8px;
            min-width: 54px;
            background: var(--bg-overlay);
            border-radius: var(--radius-sm);
        }

        .fc-hour.now {
            background: var(--accent-muted);
            border: 1px solid rgba(200,164,110,0.15);
        }

        .fc-hour .h-time {
            font-family: var(--font-body);
            font-size: 0.625rem;
            color: var(--text-ghost);
            margin-bottom: 4px;
        }

        .fc-hour .h-icon { font-size: 1.125rem; margin-bottom: 3px; }

        .fc-hour .h-temp {
            font-family: var(--font-display);
            font-size: 0.8125rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .fc-hour .h-precip {
            font-family: var(--font-body);
            font-size: 0.5625rem;
            color: var(--clr-rain);
            margin-top: 2px;
        }

        .fc-day-stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        .fc-day-stats .val {
            font-family: var(--font-display);
            font-weight: 500;
            color: var(--text-secondary);
            margin-left: 4px;
        }

        /* ---------- FOOTER ---------- */
        .foot {
            text-align: center;
            padding: 32px 0 16px;
            font-size: 0.75rem;
            color: var(--text-ghost);
        }

        .foot a {
            color: var(--text-tertiary);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .foot a:hover { color: var(--accent); }

        .foot-hardware {
            font-size: 0.6875rem;
            color: var(--text-ghost);
            margin-top: 4px;
        }

        /* ---------- LOADING ---------- */
        .loading-state {
            font-family: var(--font-body);
            font-size: 0.8125rem;
            color: var(--text-ghost);
            padding: 32px;
            text-align: center;
            font-style: italic;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .loading-state.pulse { animation: breathe 2.5s ease-in-out infinite; }

        /* ---------- ENTRANCE ANIMATIONS ---------- */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero { animation: fadeUp 0.5s var(--ease-out) both; animation-delay: 0.05s; }
        .metrics { animation: fadeUp 0.5s var(--ease-out) both; animation-delay: 0.15s; }
        .charts-section { animation: fadeUp 0.5s var(--ease-out) both; animation-delay: 0.25s; }
        .forecast-block { animation: fadeUp 0.5s var(--ease-out) both; animation-delay: 0.35s; }

        /* ---------- RESPONSIVE ---------- */

        /* Small phones */
        @media (max-width: 359px) {
            .metrics { grid-template-columns: repeat(2, 1fr); }
            .hero-temp { font-size: 3.5rem; }
        }

        /* Mobile */
        @media (max-width: 639px) {
            .fc-preview { display: none; }

            .forecast-row {
                grid-template-columns: 52px 30px 1fr auto;
            }

            .fc-day-stats { flex-wrap: wrap; gap: 10px; }
        }

        /* Tablet+ */
        @media (min-width: 640px) {
            .app {
                max-width: 540px;
                padding: 0 24px 48px;
            }

            .hero-temp { font-size: 6rem; }
            .chart-area { height: 180px; }

            .forecast-row {
                grid-template-columns: 66px 34px 1fr auto;
            }

            .fc-temp-bar { display: none; }
        }

        /* Desktop */
        @media (min-width: 900px) {
            .app { max-width: 600px; }
            .chart-area { height: 200px; }
        }

        /* ---- Scrollbar ---- */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-overlay); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <h1>Copenhagen</h1>
                <div class="header-subtitle">Digeweather Station</div>
            </div>
            <div class="header-right">
                <span class="battery-warn" id="battery">Low battery</span>
                <div class="status-indicator">
                    <span class="status-pip" id="status-pip"></span>
                    <span id="status-text">Live</span>
                </div>
            </div>
        </div>

        <!-- HERO -->
        <div class="hero">
            <div class="hero-temp"><span id="temp">--</span><span class="unit">°</span></div>
            <div class="hero-condition" id="condition">Loading</div>
            <div class="hero-time">Updated <span id="timestamp" class="time-ago">--</span></div>
        </div>

        <!-- METRICS -->
        <div class="metrics">
            <div class="metric humidity">
                <div class="metric-label">Humidity</div>
                <div class="metric-value"><span id="humidity">--</span><span class="unit">%</span></div>
            </div>
            <div class="metric wind">
                <div class="metric-label">Wind</div>
                <div class="metric-value"><span id="wind">--</span><span class="unit">m/s</span></div>
                <div class="compass-mini">
                    <div class="compass-ring">
                        <div class="compass-needle" id="compass-arrow"></div>
                    </div>
                    <span class="compass-dir" id="wind-dir">--</span>
                </div>
            </div>
            <div class="metric gust">
                <div class="metric-label">Gust</div>
                <div class="metric-value"><span id="gust">--</span><span class="unit">m/s</span></div>
            </div>
            <div class="metric rain">
                <div class="metric-label">Rain 24h</div>
                <div class="metric-value"><span id="rain">--</span><span class="unit">mm</span></div>
                <div class="metric-sub">1h: <span id="rain-hour">--</span>mm</div>
            </div>
        </div>

        <!-- CHARTS -->
        <div class="charts-section">
            <div class="section-label">History</div>

            <div class="chart-card">
                <div class="chart-top">
                    <div class="chart-title">Temperature</div>
                    <div class="range-group">
                        <button class="range-btn active" data-range="24h">24H</button>
                        <button class="range-btn" data-range="7d">7D</button>
                        <button class="range-btn" data-range="30d">30D</button>
                        <button class="range-btn" data-range="1y">1Y</button>
                        <button class="range-btn" data-range="all">ALL</button>
                    </div>
                </div>
                <div class="chart-area"><canvas id="tempChart"></canvas></div>
            </div>

            <div class="chart-card">
                <div class="chart-top">
                    <div class="chart-title">Wind Speed</div>
                </div>
                <div class="chart-area"><canvas id="windChart"></canvas></div>
            </div>

            <div class="chart-card">
                <div class="chart-top">
                    <div class="chart-title">Rainfall</div>
                </div>
                <div class="chart-area"><canvas id="rainChart"></canvas></div>
            </div>
        </div>

        <!-- FORECAST -->
        <div class="forecast-block">
            <div class="section-label">10-Day Forecast</div>
            <div class="forecast-list" id="forecast">
                <div class="loading-state pulse">Loading forecast...</div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="foot">
            <div>Forecast by <a href="https://www.met.no/" target="_blank" rel="noopener">MET Norway</a></div>
            <div class="foot-hardware">Bresser 5-in-1 · ESP32 + CC1101</div>
        </div>
    </div>

    <script>
        // Configuration
        const GITHUB_USER = 'StefanWiswedel';
        const GITHUB_REPO = 'digeweather';
        const DATA_FILE = 'data/weather.json';
        const REFRESH_INTERVAL = 60000;

        const LAT = 55.6761;
        const LON = 12.5683;

        let tempChart = null;
        let windChart = null;
        let rainChart = null;

        let weatherData = {
            history: [],
            hourly: []
        };

        let currentRange = '24h';
        let lastUpdateTime = null;

        const weatherIcons = {
            'clearsky': '☀',
            'fair': '🌤',
            'partlycloudy': '⛅',
            'cloudy': '☁',
            'rain': '🌧',
            'lightrain': '🌦',
            'heavyrain': '🌧',
            'rainshowers': '🌦',
            'lightrainshowers': '🌦',
            'heavyrainshowers': '🌧',
            'sleet': '🌨',
            'snow': '❄',
            'snowshowers': '🌨',
            'fog': '🌫',
            'thunder': '⛈',
            'rainandthunder': '⛈'
        };

        function getWeatherIcon(symbolCode) {
            const base = symbolCode.replace(/_day|_night|_polartwilight/g, '');
            return weatherIcons[base] || '◯';
        }

        // Relative time display + status freshness
        function updateRelativeTime() {
            if (!lastUpdateTime) return;
            const el = document.getElementById('timestamp');
            const pip = document.getElementById('status-pip');
            const statusText = document.getElementById('status-text');
            const now = Date.now();
            const diff = Math.floor((now - lastUpdateTime) / 1000);

            let text, cssClass;
            if (diff < 60) {
                text = 'just now';
                cssClass = 'time-ago';
            } else if (diff < 3600) {
                const mins = Math.floor(diff / 60);
                text = `${mins} min ago`;
                cssClass = 'time-ago';
            } else if (diff < 86400) {
                const hrs = Math.floor(diff / 3600);
                text = `${hrs} hr ago`;
                cssClass = 'time-ago';
            } else {
                text = 'over a day ago';
                cssClass = 'time-stale';
            }

            el.textContent = text;
            el.className = cssClass;

            // Update status based on data freshness, not just API reachability
            // Data older than 5 min = stale (ESP32 pushes every ~60s)
            if (diff > 300) {
                pip.classList.add('offline');
                statusText.textContent = 'Stale';
            } else {
                pip.classList.remove('offline');
                statusText.textContent = 'Live';
            }
        }

        async function fetchWeatherData() {
            try {
                const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}`;
                const response = await fetch(apiUrl, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });

                if (!response.ok) throw new Error('Failed to fetch');

                const fileData = await response.json();
                const content = atob(fileData.content.replace(/\n/g, ''));
                const data = JSON.parse(content);

                weatherData.history = data.history || [];
                weatherData.hourly = data.hourly || [];

                updateDisplay(data.current);
                updateCharts();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status-pip').classList.add('offline');
                document.getElementById('status-text').textContent = 'Offline';
            }
        }

        function updateDisplay(current) {
            if (!current) return;

            // Parse and store timestamp for relative time
            const ts = current.timestamp || '';
            if (ts) {
                lastUpdateTime = parseTimestamp(ts)?.getTime() || null;
                updateRelativeTime();
            }

            document.getElementById('temp').textContent =
                current.temperature !== undefined ? current.temperature.toFixed(1) : '--';

            const temp = current.temperature;
            let condition = '';
            if (temp !== undefined) {
                if (temp < 0) condition = 'Freezing';
                else if (temp < 10) condition = 'Cold';
                else if (temp < 20) condition = 'Mild';
                else if (temp < 25) condition = 'Warm';
                else condition = 'Hot';
            }
            document.getElementById('condition').textContent = condition;

            document.getElementById('humidity').textContent =
                current.humidity !== undefined ? current.humidity : '--';

            document.getElementById('wind').textContent =
                current.windSpeed !== undefined ? current.windSpeed.toFixed(1) : '--';
            document.getElementById('gust').textContent =
                current.windGust !== undefined ? current.windGust.toFixed(1) : '--';

            const dir = current.windDirection;
            if (dir !== undefined) {
                document.getElementById('compass-arrow').style.transform = `rotate(${dir}deg)`;
                document.getElementById('wind-dir').textContent = getWindDirectionName(dir);
            }

            updateRainDisplay();

            const batteryEl = document.getElementById('battery');
            if (current.battery === 'LOW') {
                batteryEl.classList.add('visible');
            } else {
                batteryEl.classList.remove('visible');
            }
        }

        function getWindDirectionName(deg) {
            const dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE',
                         'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            return dirs[Math.round(deg / 22.5) % 16];
        }

        function updateRainDisplay() {
            const history = weatherData.history;
            let rain24h = 0;
            let rainLastHour = 0;

            if (history.length > 0) {
                let firstRain = null;
                let lastRain = null;

                for (let i = 0; i < history.length; i++) {
                    if (history[i].rain !== undefined && history[i].rain >= 0) {
                        if (firstRain === null) firstRain = history[i].rain;
                        lastRain = history[i].rain;
                    }
                }

                if (firstRain !== null && lastRain !== null) {
                    rain24h = Math.max(0, lastRain - firstRain);
                }

                const hourAgo = Math.max(0, history.length - 60);
                let firstHourRain = null;

                for (let i = hourAgo; i < history.length; i++) {
                    if (history[i].rain !== undefined && history[i].rain >= 0) {
                        if (firstHourRain === null) firstHourRain = history[i].rain;
                        lastRain = history[i].rain;
                    }
                }

                if (firstHourRain !== null && lastRain !== null) {
                    rainLastHour = Math.max(0, lastRain - firstHourRain);
                }
            }

            document.getElementById('rain').textContent = rain24h.toFixed(1);
            document.getElementById('rain-hour').textContent = rainLastHour.toFixed(1);
        }

        function parseTimestamp(ts) {
            if (!ts) return null;
            const parts = ts.split(' ');
            const dateParts = parts[0].split('-');
            const timeParts = (parts[1] || '00:00:00').split(':');
            return new Date(
                parseInt(dateParts[0]),
                parseInt(dateParts[1]) - 1,
                parseInt(dateParts[2]),
                parseInt(timeParts[0]) || 0,
                parseInt(timeParts[1]) || 0,
                parseInt(timeParts[2]) || 0
            );
        }

        function getTimeRange(range) {
            const now = new Date();
            let minTime, unit, displayFormat;

            switch (range) {
                case '24h':
                    minTime = new Date(now - 24 * 60 * 60 * 1000);
                    unit = 'hour';
                    displayFormat = 'HH:mm';
                    break;
                case '7d':
                    minTime = new Date(now - 7 * 24 * 60 * 60 * 1000);
                    unit = 'day';
                    displayFormat = 'EEE';
                    break;
                case '30d':
                    minTime = new Date(now - 30 * 24 * 60 * 60 * 1000);
                    unit = 'day';
                    displayFormat = 'MMM d';
                    break;
                case '1y':
                    minTime = new Date(now - 365 * 24 * 60 * 60 * 1000);
                    unit = 'month';
                    displayFormat = 'MMM';
                    break;
                case 'all':
                default:
                    minTime = null;
                    unit = 'month';
                    displayFormat = 'MMM yyyy';
                    break;
            }

            return { minTime, maxTime: now, unit, displayFormat };
        }

        function updateCharts() {
            const { minTime, maxTime, unit, displayFormat } = getTimeRange(currentRange);

            let tempData = [];
            let tempMinData = [];
            let tempMaxData = [];
            let windData = [];
            let windMaxData = [];
            let rainData = [];

            if (currentRange === '24h') {
                const historyStart = weatherData.history.length > 0
                    ? parseTimestamp(weatherData.history[0].timestamp)
                    : null;

                for (const entry of weatherData.hourly) {
                    const timestamp = parseTimestamp(entry.hour);
                    if (!timestamp) continue;
                    if (minTime && timestamp < minTime) continue;
                    if (historyStart && timestamp >= historyStart) continue;

                    if (entry.tempAvg !== undefined) tempData.push({ x: timestamp, y: entry.tempAvg });
                    if (entry.windAvg !== undefined) windData.push({ x: timestamp, y: entry.windAvg });
                    if (entry.rainDelta !== undefined) rainData.push({ x: timestamp, y: Math.max(0, entry.rainDelta) });
                }

                const maxPoints = 200;
                const sampleRate = Math.max(1, Math.floor(weatherData.history.length / maxPoints));
                const hourlyRainMap = {};

                for (let i = 0; i < weatherData.history.length; i += sampleRate) {
                    const entry = weatherData.history[i];
                    const timestamp = parseTimestamp(entry.timestamp);
                    if (!timestamp) continue;
                    if (minTime && timestamp < minTime) continue;

                    if (entry.temperature !== undefined) tempData.push({ x: timestamp, y: entry.temperature });
                    if (entry.windSpeed !== undefined) windData.push({ x: timestamp, y: entry.windSpeed });
                }

                for (const entry of weatherData.history) {
                    if (entry.rain !== undefined && entry.rain >= 0) {
                        const hourKey = entry.timestamp?.substring(0, 13) || '';
                        if (hourKey) {
                            if (!hourlyRainMap[hourKey]) {
                                hourlyRainMap[hourKey] = { first: entry.rain, last: entry.rain, time: parseTimestamp(entry.timestamp) };
                            } else {
                                hourlyRainMap[hourKey].last = entry.rain;
                            }
                        }
                    }
                }
                const minuteRain = Object.values(hourlyRainMap).map(h => ({
                    x: h.time,
                    y: Math.max(0, h.last - h.first)
                }));
                rainData = rainData.concat(minuteRain);
                rainData.sort((a, b) => a.x - b.x);
            } else {
                for (const entry of weatherData.hourly) {
                    const timestamp = parseTimestamp(entry.hour);
                    if (!timestamp) continue;
                    if (minTime && timestamp < minTime) continue;

                    if (entry.tempAvg !== undefined) tempData.push({ x: timestamp, y: entry.tempAvg });
                    if (entry.tempMin !== undefined) tempMinData.push({ x: timestamp, y: entry.tempMin });
                    if (entry.tempMax !== undefined) tempMaxData.push({ x: timestamp, y: entry.tempMax });
                    if (entry.windAvg !== undefined) windData.push({ x: timestamp, y: entry.windAvg });
                    if (entry.windMax !== undefined) windMaxData.push({ x: timestamp, y: entry.windMax });
                    if (entry.rainDelta !== undefined) rainData.push({ x: timestamp, y: Math.max(0, entry.rainDelta) });
                }
            }

            let chartMinTime = minTime;
            if (!chartMinTime && tempData.length > 0) {
                chartMinTime = tempData[0].x;
            }

            const now = new Date();
            const GAP_THRESHOLD = 5 * 60 * 1000;

            // Segment callback: hide line segments that span a data gap > 5 min.
            // This is Chart.js's native way to handle gaps — no null/NaN hacks.
            function gapSegmentStyle(ctx, normalColor) {
                const p0 = ctx.p0.parsed;
                const p1 = ctx.p1.parsed;
                if (p0 && p1) {
                    const gap = p1.x - p0.x;
                    if (gap > GAP_THRESHOLD) {
                        return 'transparent';
                    }
                }
                return normalColor;
            }

            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    intersect: false,
                    mode: 'index'
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(33,30,25,0.95)',
                        titleColor: '#a89f93',
                        bodyColor: '#ede6db',
                        borderColor: 'rgba(210,190,160,0.10)',
                        borderWidth: 1,
                        cornerRadius: 8,
                        padding: 10,
                        titleFont: { size: 10, family: "'Newsreader', Georgia, serif" },
                        bodyFont: { size: 12, family: "'Fraunces', Georgia, serif" },
                        displayColors: false
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        min: chartMinTime,
                        max: maxTime,
                        time: {
                            unit: unit,
                            displayFormats: {
                                hour: 'HH:mm',
                                day: 'EEE d',
                                month: 'MMM'
                            }
                        },
                        grid: { color: 'rgba(210,190,160,0.03)', drawBorder: false },
                        ticks: {
                            color: '#7a7168',
                            maxTicksLimit: 6,
                            font: { size: 9, family: "'Newsreader', Georgia, serif" }
                        },
                        border: { display: false }
                    },
                    y: {
                        grid: { color: 'rgba(210,190,160,0.03)', drawBorder: false },
                        ticks: {
                            color: '#7a7168',
                            font: { size: 9, family: "'Newsreader', Georgia, serif" },
                            maxTicksLimit: 5
                        },
                        border: { display: false }
                    }
                },
                elements: {
                    point: { radius: 0, hoverRadius: 4, hoverBorderWidth: 2 },
                    line: { tension: 0.4, borderWidth: 2 }
                }
            };

            // Temperature chart
            const tempCtx = document.getElementById('tempChart').getContext('2d');
            if (tempChart) tempChart.destroy();

            const tempGradient = tempCtx.createLinearGradient(0, 0, 0, 140);
            tempGradient.addColorStop(0, 'rgba(200,164,110,0.14)');
            tempGradient.addColorStop(1, 'rgba(200,164,110,0)');

            const tempDatasets = [{
                label: currentRange === '24h' ? 'Temperature' : 'Avg',
                data: tempData,
                borderColor: '#c8a46e',
                backgroundColor: tempGradient,
                fill: true,
                pointHoverBackgroundColor: '#c8a46e',
                segment: {
                    borderColor: ctx => gapSegmentStyle(ctx, '#c8a46e'),
                    backgroundColor: ctx => gapSegmentStyle(ctx, undefined)
                }
            }];

            if (tempMinData.length > 0 && currentRange !== '24h') {
                tempDatasets.push({
                    label: 'Min',
                    data: tempMinData,
                    borderColor: 'rgba(126,158,181,0.35)',
                    borderWidth: 1,
                    borderDash: [4, 4],
                    fill: false,
                    segment: { borderColor: ctx => gapSegmentStyle(ctx, 'rgba(126,158,181,0.35)') }
                });
                tempDatasets.push({
                    label: 'Max',
                    data: tempMaxData,
                    borderColor: 'rgba(200,164,110,0.35)',
                    borderWidth: 1,
                    borderDash: [4, 4],
                    fill: false,
                    segment: { borderColor: ctx => gapSegmentStyle(ctx, 'rgba(200,164,110,0.35)') }
                });
            }

            tempChart = new Chart(tempCtx, {
                type: 'line',
                data: { datasets: tempDatasets },
                options: {
                    ...chartOptions,
                    plugins: {
                        ...chartOptions.plugins,
                        legend: {
                            display: tempMinData.length > 0 && currentRange !== '24h',
                            labels: { color: '#7a7168', font: { size: 9, family: "'Newsreader', Georgia, serif" }, boxWidth: 12, padding: 8 }
                        }
                    }
                }
            });

            // Wind chart
            const windCtx = document.getElementById('windChart').getContext('2d');
            if (windChart) windChart.destroy();

            const windGradient = windCtx.createLinearGradient(0, 0, 0, 140);
            windGradient.addColorStop(0, 'rgba(154,176,125,0.12)');
            windGradient.addColorStop(1, 'rgba(154,176,125,0)');

            const windDatasets = [{
                label: currentRange === '24h' ? 'Wind' : 'Avg',
                data: windData,
                borderColor: '#9ab07d',
                backgroundColor: windGradient,
                fill: true,
                pointHoverBackgroundColor: '#9ab07d',
                segment: {
                    borderColor: ctx => gapSegmentStyle(ctx, '#9ab07d'),
                    backgroundColor: ctx => gapSegmentStyle(ctx, undefined)
                }
            }];

            if (windMaxData.length > 0 && currentRange !== '24h') {
                windDatasets.push({
                    label: 'Gust',
                    data: windMaxData,
                    borderColor: 'rgba(181,160,138,0.35)',
                    borderWidth: 1,
                    borderDash: [4, 4],
                    fill: false,
                    segment: { borderColor: ctx => gapSegmentStyle(ctx, 'rgba(181,160,138,0.35)') }
                });
            }

            windChart = new Chart(windCtx, {
                type: 'line',
                data: { datasets: windDatasets },
                options: {
                    ...chartOptions,
                    plugins: {
                        ...chartOptions.plugins,
                        legend: {
                            display: windMaxData.length > 0 && currentRange !== '24h',
                            labels: { color: '#7a7168', font: { size: 9, family: "'Newsreader', Georgia, serif" }, boxWidth: 12, padding: 8 }
                        }
                    }
                }
            });

            // Rain chart
            const rainCtx = document.getElementById('rainChart').getContext('2d');
            if (rainChart) rainChart.destroy();

            rainChart = new Chart(rainCtx, {
                type: 'bar',
                data: {
                    datasets: [{
                        label: 'Rain (mm)',
                        data: rainData,
                        backgroundColor: 'rgba(126,158,181,0.30)',
                        borderColor: 'rgba(126,158,181,0.50)',
                        borderWidth: 1,
                        borderRadius: 3,
                        barPercentage: 0.7,
                        hoverBackgroundColor: 'rgba(126,158,181,0.45)'
                    }]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: {
                            ...chartOptions.scales.y,
                            beginAtZero: true,
                            min: 0
                        }
                    }
                }
            });
        }

        document.querySelectorAll('.range-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentRange = btn.dataset.range;
                updateCharts();
            });
        });

        async function fetchForecast() {
            try {
                const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${LAT}&lon=${LON}`;
                const response = await fetch(url, {
                    headers: {
                        'User-Agent': 'WeatherDashboard/1.0 github.com/StefanWiswedel/digeweather'
                    }
                });

                if (!response.ok) throw new Error('Forecast fetch failed');

                const data = await response.json();
                displayForecast(data);
            } catch (error) {
                console.error('Forecast error:', error);
                document.getElementById('forecast').innerHTML =
                    '<div class="loading-state">Forecast unavailable</div>';
            }
        }

        function displayForecast(data) {
            const timeseries = data.properties.timeseries;
            const dailyForecasts = {};
            const currentHour = new Date().getHours();
            const today = new Date().toISOString().split('T')[0];

            timeseries.forEach(entry => {
                const date = entry.time.split('T')[0];
                const hour = parseInt(entry.time.split('T')[1].split(':')[0]);
                const details = entry.data.instant.details;
                const next1h = entry.data.next_1_hours;
                const next6h = entry.data.next_6_hours;

                if (!dailyForecasts[date]) {
                    dailyForecasts[date] = {
                        hourly: [],
                        tempMax: -Infinity,
                        tempMin: Infinity,
                        totalPrecip: 0,
                        noonData: null
                    };
                }

                if (hour % 3 === 0 || (date === today && hour >= currentHour)) {
                    dailyForecasts[date].hourly.push({
                        hour: hour,
                        temp: details.air_temperature,
                        symbol: next1h?.summary?.symbol_code || next6h?.summary?.symbol_code || 'cloudy',
                        precip: next1h?.details?.precipitation_amount || 0,
                        wind: details.wind_speed,
                        isNow: date === today && hour === currentHour
                    });
                }

                if (details.air_temperature > dailyForecasts[date].tempMax) {
                    dailyForecasts[date].tempMax = details.air_temperature;
                }
                if (details.air_temperature < dailyForecasts[date].tempMin) {
                    dailyForecasts[date].tempMin = details.air_temperature;
                }

                if (next1h?.details?.precipitation_amount) {
                    dailyForecasts[date].totalPrecip += next1h.details.precipitation_amount;
                }

                if (Math.abs(hour - 12) < Math.abs((dailyForecasts[date].noonData?.hour || 99) - 12)) {
                    dailyForecasts[date].noonData = {
                        hour: hour,
                        symbol: next6h?.summary?.symbol_code || 'cloudy',
                        wind: details.wind_speed,
                        windDir: details.wind_from_direction,
                        humidity: details.relative_humidity
                    };
                }
            });

            const days = Object.keys(dailyForecasts).slice(0, 10);

            // Calculate global temp range for temperature bars
            let globalMin = Infinity, globalMax = -Infinity;
            days.forEach(date => {
                const f = dailyForecasts[date];
                if (f.tempMin < globalMin) globalMin = f.tempMin;
                if (f.tempMax > globalMax) globalMax = f.tempMax;
            });
            const tempSpan = globalMax - globalMin || 1;

            const forecastEl = document.getElementById('forecast');

            forecastEl.innerHTML = days.map((date, idx) => {
                const f = dailyForecasts[date];
                const noon = f.noonData || {};
                const dayName = idx === 0 ? 'Today' :
                               idx === 1 ? 'Tmrw' :
                               new Date(date).toLocaleDateString('en-US', { weekday: 'short' });
                const dateStr = new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                // Temperature bar position
                const barLeft = ((f.tempMin - globalMin) / tempSpan * 100).toFixed(1);
                const barWidth = (((f.tempMax - f.tempMin) / tempSpan) * 100).toFixed(1);

                const previewHourly = f.hourly.slice(0, 6).map(h => {
                    const timeStr = h.hour.toString().padStart(2, '0');
                    return `
                        <div class="fc-pip${h.isNow ? ' now' : ''}">
                            <span class="pip-time">${h.isNow ? 'Now' : timeStr}</span>
                            <span class="pip-icon">${getWeatherIcon(h.symbol)}</span>
                            <span class="pip-temp">${Math.round(h.temp)}°</span>
                        </div>
                    `;
                }).join('');

                const fullHourly = f.hourly.map(h => {
                    const timeStr = h.hour.toString().padStart(2, '0') + ':00';
                    const precipHtml = h.precip > 0 ? `<div class="h-precip">${h.precip.toFixed(1)}mm</div>` : '';
                    return `
                        <div class="fc-hour${h.isNow ? ' now' : ''}">
                            <div class="h-time">${h.isNow ? 'Now' : timeStr}</div>
                            <div class="h-icon">${getWeatherIcon(h.symbol)}</div>
                            <div class="h-temp">${Math.round(h.temp)}°</div>
                            ${precipHtml}
                        </div>
                    `;
                }).join('');

                const precipDisplay = f.totalPrecip > 0.1 ? f.totalPrecip.toFixed(1) + 'mm' : '';

                return `
                    <div class="forecast-row" onclick="this.classList.toggle('expanded')">
                        <div class="fc-day">
                            ${dayName}
                            <span class="fc-date">${dateStr}</span>
                        </div>
                        <div class="fc-icon">${getWeatherIcon(noon.symbol || 'cloudy')}</div>
                        <div class="fc-middle">
                            <div class="fc-preview">${previewHourly}</div>
                            <div class="fc-temp-bar">
                                <div class="fc-temp-bar-fill" style="left:${barLeft}%;width:${barWidth}%"></div>
                            </div>
                        </div>
                        <div class="fc-right">
                            <div class="fc-temps">
                                <span class="fc-high">${Math.round(f.tempMax)}°</span>
                                <span class="fc-low">${Math.round(f.tempMin)}°</span>
                            </div>
                            ${precipDisplay ? `<div class="fc-precip">${precipDisplay}</div>` : ''}
                            <span class="fc-chevron">▾</span>
                        </div>
                        <div class="fc-details">
                            <div class="fc-details-inner">
                                <div class="fc-hourly-scroll">${fullHourly}</div>
                                <div class="fc-day-stats">
                                    <span>Wind <span class="val">${noon.wind !== undefined ? noon.wind.toFixed(1) : '--'} m/s</span></span>
                                    <span>Humidity <span class="val">${noon.humidity !== undefined ? Math.round(noon.humidity) : '--'}%</span></span>
                                    <span>Precip <span class="val">${f.totalPrecip > 0.1 ? f.totalPrecip.toFixed(1) + 'mm' : '0mm'}</span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initial load
        fetchWeatherData();
        fetchForecast();

        setInterval(fetchWeatherData, REFRESH_INTERVAL);
        setInterval(fetchForecast, 3600000);
        setInterval(updateRelativeTime, 15000);
    </script>
</body>
</html>
